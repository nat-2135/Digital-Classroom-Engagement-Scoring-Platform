# Core Spring Configuration
server.port=${PORT:8080}
application.env=${SPRING_PROFILES_ACTIVE:prod}

# Database Configuration (Multi-DB Support for Local/Render)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:~/classroom_engagement_db;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Hibernate will auto-detect the dialect based on the JDBC URL

# JWT Configuration
jwt.secret=${JWT_SECRET:70617373776f72645f7365637265745f6b65795f6c6f6e675f656e6f7567685f666f725f736861323536}
jwt.expiration=86400000

# Security Configuration
spring.main.allow-bean-definition-overriding=true
spring.main.allow-circular-references=true

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://digital-classroom-engagement-scorin.vercel.app,http://localhost:3000}